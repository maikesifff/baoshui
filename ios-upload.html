<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上传 iOS 安装包 - 自报税</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "PingFang SC", sans-serif; padding: 24px; max-width: 480px; margin: 0 auto; }
    h1 { font-size: 18px; margin-bottom: 20px; }
    .card { background: #f8fafc; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    label { display: block; font-size: 14px; margin-bottom: 8px; color: #334155; }
    input[type="file"] { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 12px; }
    button { padding: 12px 24px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 14px; }
    .msg.success { background: #dcfce7; color: #166534; }
    .msg.error { background: #fee2e2; color: #991b1b; }
    a.link { display: inline-block; margin-top: 12px; color: #2563eb; font-weight: 600; }
  </style>
</head>
<body>
  <h1>上传 iOS 安装包 (App.ipa)</h1>
  <div class="card">
    <form id="form">
      <label>选择从 Codemagic 下载的 App.ipa 文件</label>
      <input type="file" name="ipa" accept=".ipa,.IPA" required>
      <button type="submit" id="btn">上传</button>
    </form>
    <div id="msg"></div>
  </div>
  <p style="font-size: 12px; color: #64748b;">上传后可通过 <a href="/download/ios-install">OTA 安装页</a> 在 iPhone 上安装（需 HTTPS）</p>
  <script src="config.js"></script>
  <script>
    document.getElementById('form').onsubmit = async (e) => {
      e.preventDefault();
      const base = (window.API_CONFIG && window.API_CONFIG.BASE_URL) ? window.API_CONFIG.BASE_URL : '';
      const fd = new FormData(e.target);
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');
      btn.disabled = true;
      msg.innerHTML = '';
      try {
        const r = await fetch(base + '/api/ios/upload-ipa', {
          method: 'POST',
          body: fd
        });
        const j = await r.json();
        if (j.code === 0) {
          msg.className = 'msg success';
          msg.innerHTML = '上传成功！<a class="link" href="' + base + '/download/ios-install">前往 OTA 安装页</a>';
        } else {
          msg.className = 'msg error';
          msg.textContent = j.message || '上传失败';
        }
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = '请求失败：' + err.message;
      }
      btn.disabled = false;
    };
  </script>
</body>
</html>
