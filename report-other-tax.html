<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>其他税 - 自报税</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .report-list-page { padding: 16px; }
    .report-list-item { padding: 12px 16px; background: #fff; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
    .report-list-item .period { font-weight: 500; }
    .report-list-item .meta { font-size: 13px; color: var(--gray-500); margin-top: 4px; }
    .report-list-empty { text-align: center; padding: 48px 24px; color: var(--gray-500); }
  </style>
</head>
<body>
  <div class="app">
    <header class="page-header">
      <a href="report.html" class="btn-back" aria-label="返回">‹</a>
      <h1 class="page-title">其他税</h1>
    </header>
    <main class="report-list-page">
      <div id="reportOtherTaxList"></div>
    </main>
  </div>
  <script src="config.js"></script>
  <script>
(function() {
  var token = localStorage.getItem('token');
  var companyId = localStorage.getItem('currentCompanyId') || '';
  var API = window.API_CONFIG || { BASE_URL: '', ENDPOINTS: {} };
  if (!token || !companyId) {
    document.getElementById('reportOtherTaxList').innerHTML = '<div class="report-list-empty">请先登录并选择企业</div>';
    return;
  }
  var url = (API.BASE_URL || '') + (API.ENDPOINTS.REPORT_OTHER_TAX || '/api/report/other-tax') + '?company_id=' + encodeURIComponent(companyId);
  fetch(url, { headers: { 'Authorization': 'Bearer ' + token } })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      var el = document.getElementById('reportOtherTaxList');
      if (res.code !== 0 || !res.data || !res.data.length) {
        el.innerHTML = '<div class="report-list-empty">暂无其他税种记录</div>';
        return;
      }
      el.innerHTML = res.data.map(function(i) {
        return '<div class="report-list-item"><div class="period">' + (i.period || '') + ' ' + (i.tax_type || '') + '</div><div class="meta">' + (i.status || '') + ' ' + (i.submitted_at || '') + '</div></div>';
      }).join('');
    })
    .catch(function() { document.getElementById('reportOtherTaxList').innerHTML = '<div class="report-list-empty">加载失败</div>'; });
})();
  </script>
</body>
</html>
