<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>暂无该功能 - 自报税</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .coming-soon-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      padding: 24px;
      text-align: center;
    }
    .coming-soon-title { font-size: 20px; font-weight: 600; color: var(--gray-800, #1f2937); margin: 0 0 12px; }
    .coming-soon-desc { font-size: 14px; color: var(--gray-500, #6b7280); margin: 0 0 24px; }
    .coming-soon-back {
      display: inline-block;
      padding: 10px 20px;
      font-size: 15px;
      color: var(--white, #fff);
      background: var(--primary, #2563eb);
      border-radius: 8px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="page-header">
      <a href="index.html" class="btn-back" aria-label="返回">‹</a>
      <h1 class="page-title">暂无该功能</h1>
    </header>
    <main class="coming-soon-page">
      <p class="coming-soon-title">该功能暂未开放</p>
      <p class="coming-soon-desc">请返回首页使用其他功能。</p>
      <a href="index.html" class="coming-soon-back">返回首页</a>
    </main>
  </div>
</body>
</html>
