<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>自动报税 - 自报税</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="page-header">
      <a href="index.html" class="btn-back" aria-label="返回">‹</a>
      <h1 class="page-title">自动报税</h1>
    </header>

    <main class="feature-intro-page">
      <div class="feature-intro-card">
        <section class="feature-intro-section">
          <h2 class="feature-intro-title">申报方式</h2>
          <p class="feature-intro-text">需要您按时完成记账,自报税系统会根据税种的申报期限,按时自动报税</p>
        </section>

        <section class="feature-intro-section">
          <h2 class="feature-intro-title">申报范围</h2>
          <p class="feature-intro-text">税局给您企业核定的所有税</p>
        </section>

        <section class="feature-intro-section">
          <h2 class="feature-intro-title">申报频次与方式</h2>
          <ul class="feature-intro-list">
            <li>每个月自动申报员工个税、增值税及附加税(仅一般纳税人)等</li>
            <li>每个季度自动申报企业所得税/经营所得税、增值税及附加税、财务报表等</li>
            <li>每年申报残保金、印花税、城镇垃圾处理费等</li>
          </ul>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
