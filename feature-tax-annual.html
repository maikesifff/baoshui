<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>税务年报 - 自报税</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="page-header">
      <a href="index.html" class="btn-back" aria-label="返回">‹</a>
      <h1 class="page-title">税务年报</h1>
    </header>

    <main class="feature-intro-page">
      <div class="feature-intro-card">
        <section class="feature-intro-section">
          <h2 class="feature-intro-title">申报方式</h2>
          <p class="feature-intro-text">自报税统一时间自动申报</p>
        </section>

        <section class="feature-intro-section">
          <h2 class="feature-intro-title">申报范围</h2>
          <ul class="feature-intro-list">
            <li>税局已核定企业所得税的公司,申报企业所得税年度汇算清缴</li>
            <li>税局已核定经营所得税的个体户、个人独资企业、合伙企业,申报经营所得税年度汇算清缴</li>
            <li>已购买年费套餐的企业</li>
          </ul>
        </section>

        <section class="feature-intro-section">
          <h2 class="feature-intro-title">申报频次</h2>
          <ul class="feature-intro-list">
            <li>每年2月1日至3月31日,自动申报经营所得税年度汇算清缴</li>
            <li>每年3月1日至5月31日,自动申报企业所得税年度汇算清缴</li>
          </ul>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
