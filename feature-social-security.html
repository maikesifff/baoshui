<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>申报社保 - 自报税</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="page-header">
      <a href="index.html" class="btn-back" aria-label="返回">‹</a>
      <h1 class="page-title">申报社保</h1>
    </header>

    <main class="feature-intro-page">
      <div class="feature-intro-card">
        <section class="feature-intro-section">
          <h2 class="feature-intro-title">社保功能</h2>
          <p class="feature-intro-text">可直接在自报税APP上查询、申报、缴纳社保,社保数据自动填写在工资单</p>
        </section>

        <section class="feature-intro-section">
          <h2 class="feature-intro-title">申报范围</h2>
          <p class="feature-intro-text">目前支持广东、浙江、江苏、四川、北京,其他地区将会陆续支持。</p>
          <p class="feature-intro-text">已购买有业务套餐的企业</p>
        </section>

        <section class="feature-intro-section">
          <h2 class="feature-intro-title">申报频次与方式</h2>
          <p class="feature-intro-text">每个月申报一次。需要您每个月在自报税APP点击“申报”按钮,自报税系统自动申报、缴纳社保</p>
        </section>
      </div>
    </main>
  </div>
