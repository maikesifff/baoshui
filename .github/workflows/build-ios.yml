# 云 Mac 构建 iOS - 使用 GitHub Actions (macOS runner)
# 推送代码后自动构建，产物可在 Actions 页面或 Releases 下载
name: Build iOS

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [main, master]
    paths:
      - 'www/**'
      - 'ios/**'
      - 'package.json'
      - 'capacitor.config.json'
      - '.github/workflows/**'

jobs:
  build-ios:
    runs-on: macos-latest  # 云 Mac
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor iOS
        run: |
          npm run build
          npx cap sync ios

      - name: Build for simulator
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj -scheme App -configuration Debug -sdk iphonesimulator -arch arm64 -derivedDataPath build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Zip App for release
        run: |
          cd ios/App/build/Build/Products/Debug-iphonesimulator
          zip -r $GITHUB_WORKSPACE/App-simulator.zip App.app

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-${{ github.run_number }}
          name: iOS 构建 #${{ github.run_number }}
          body: |
            自报税 - iOS 模拟器版本
            - 仅适用于 Mac 上的 iOS 模拟器
            - 真机安装需在 Mac 上用 Xcode 构建 IPA
          files: App-simulator.zip
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
