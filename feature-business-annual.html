<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>工商年报 - 自报税</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="page-header">
      <a href="index.html" class="btn-back" aria-label="返回">‹</a>
      <h1 class="page-title">工商年报</h1>
    </header>

    <main class="feature-intro-page">
      <div class="feature-intro-card">
        <section class="feature-intro-section">
          <h2 class="feature-intro-title">申报范围</h2>
          <p class="feature-intro-text">去年及之前成立的企业,且已购买年费套餐</p>
        </section>

        <section class="feature-intro-section">
          <h2 class="feature-intro-title">申报频次与方式</h2>
          <p class="feature-intro-text">每年3月1日至6月31日申报。需要您使用“工商年报大师”软件完成申报。</p>
          <p class="feature-intro-text">“工商年报大师”是自报税自研的自助式申报工商年报软件,已准备好大部分的申报数据,您只需填写确认一部分的企业信息,即可完成申报。需在Windows电脑上使用。</p>
          <p class="feature-intro-text">北京、深圳、湖北、海南、山东,已支持在自报税APP上完成申报,其他地区会陆续支持。</p>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
